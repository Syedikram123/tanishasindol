<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBD Tanisha</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  width:100vw;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at center, #111 0%, #000 70%);
  overflow:hidden;
  font-family:'Inter', sans-serif;
  color:white;
}

/* Outer rotating ring */
.ring{
  width:min(85vw, 420px);
  height:min(85vw, 420px);
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  background: radial-gradient(circle at center, #1a1a1a, #000);
  box-shadow:
    0 0 40px rgba(212,175,55,0.3),
    inset 0 0 30px rgba(212,175,55,0.2);
}

/* Animated gold border */
.ring::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  padding:4px;
  background: conic-gradient(#d4af37, #fff5c3, #d4af37);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
  animation: rotate 8s linear infinite;
}

@keyframes rotate{
  from{ transform: rotate(0deg); }
  to{ transform: rotate(360deg); }
}

/* Inner content */
.content{
  text-align:center;
  z-index:2;
  padding:20px;
}

/* Time */
.time{
  font-family:'Cinzel', serif;
  font-size: clamp(40px, 10vw, 80px);
  font-weight:700;
  letter-spacing:3px;
  background: linear-gradient(90deg,#d4af37,#fff5c3,#d4af37);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: shine 6s linear infinite;
}

@keyframes shine{
  to{ background-position:200% center; }
}

/* Seconds */
.seconds{
  font-size: clamp(16px,4vw,28px);
  vertical-align: super;
  margin-left:5px;
}

/* Day */
.day{
  margin-top:15px;
  font-size: clamp(16px,4vw,20px);
  letter-spacing:3px;
  opacity:0.8;
}

/* Date */
.date{
  margin-top:5px;
  font-size: clamp(14px,3vw,18px);
  opacity:0.6;
  letter-spacing: 3px;

}

/* Secret Quote */
.quote{
  margin-top:30px;
  font-family:'Cinzel', serif;
  font-size: clamp(16px,4vw,22px);
  letter-spacing:1px;
  cursor:pointer;
  user-select:none;

  background: linear-gradient(90deg,#d4af37,#fff5c3,#d4af37);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: shine 6s linear infinite;
}

.quote.holding{
  text-shadow:
    0 0 10px rgba(212,175,55,0.8),
    0 0 20px rgba(212,175,55,0.6);
}
#secretTrigger{
  display:inline-block;
  user-select:none;
  -webkit-user-select:none;
}
</style>
</head>
<body>

<div class="ring">
  <div class="content">
    <div class="time">
      <span id="hoursMinutes"></span>
      <span class="seconds" id="seconds"></span>
    </div>
	
    <div class="quote">
  Happy 21st Birthday
 <br>Tanisha<br>
<br><span id="secretTrigger">05-03-2026</span>
</div>
  </div>
</div>

<script>

function updateTime(){
  const now = new Date();
  const options = { timeZone: 'Asia/Kolkata' };
  const india = new Date(now.toLocaleString('en-US', options));

  let hours = india.getHours().toString().padStart(2,'0');
  let minutes = india.getMinutes().toString().padStart(2,'0');
  let seconds = india.getSeconds().toString().padStart(2,'0');

  document.getElementById('hoursMinutes').innerText = `${hours}:${minutes}`;
  document.getElementById('seconds').innerText = seconds;
}

setInterval(updateTime,1000);
updateTime();


/* HOLD FOR 5 SECONDS ON DATE */

let holdTimer;
const trigger = document.getElementById("secretTrigger");

function startHold(e){
trigger.classList.add("holding");
  e.preventDefault();

  holdTimer = setTimeout(()=>{
    window.location.href = "hbd.html";
  },5000);
}

function cancelHold(){
trigger.classList.remove("holding");
  clearTimeout(holdTimer);
}

trigger.addEventListener("mousedown",startHold);
trigger.addEventListener("mouseup",cancelHold);
trigger.addEventListener("mouseleave",cancelHold);

trigger.addEventListener("touchstart",startHold);
trigger.addEventListener("touchend",cancelHold);
trigger.addEventListener("touchcancel",cancelHold);

</script>

</body>
</html>
